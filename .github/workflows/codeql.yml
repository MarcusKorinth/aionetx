name: codeql

on:
  push:
    branches: ["main", "release-readiness"]
  pull_request:
    branches: ["main"]
  schedule:
    # Run weekly on Monday at 08:00 UTC independent of push activity.
    - cron: "0 8 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: CodeQL - Python security analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    # CodeQL analysis itself is required. Security-alert thresholds are
    # enforced by branch protection/code-scanning settings and release gates.

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        with:
          languages: python
          # Use the default security-and-quality query suite for broad coverage.
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        with:
          category: "/language:python"
