name: Install project development dependencies
description: Install pinned CI build/dev tools and the editable package.

runs:
  using: composite
  steps:
    - name: Install pinned CI build tools
      shell: bash
      run: python -m pip install --require-hashes -r requirements/ci-build-tools.txt

    - name: Install pinned CI development tools
      shell: bash
      run: python -m pip install --require-hashes -r requirements/ci-dev-tools.txt

    - name: Install project in editable mode without dependency resolution
      shell: bash
      run: python -m pip install --no-build-isolation --no-deps -e .
